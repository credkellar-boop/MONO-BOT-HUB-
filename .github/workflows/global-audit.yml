name: Global Fleet Audit (Giles)

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:      # Manual trigger

jobs:
  audit-fleet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hub
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install pandas requests pyjwt cryptography

      - name: Run Global Royalty Audit
        env:
          APP_ID: ${{ secrets.APP_ID }}
          PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: python scripts/global_royalty_audit.py

      - name: Upload Master Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: Global-Royalty-Report
          path: GLOBAL_FLEET_AUDIT_2026.csv
